syntax = "proto3";

package at.tracklab;

import "google/protobuf/empty.proto";
import "types.proto";

service LiveData {
  rpc StreamData (google.protobuf.Empty) returns (stream DataPoint) {};
  rpc SetStreamSpeed (SetStreamSpeedRequest) returns (google.protobuf.Empty) {};
}

service Copilot {
  rpc PredictQualifyingSegment (QualifyingRequest) returns (QualifyingPrediction) {};
  rpc GetTrackEvolution(QualifyingRequest) returns (TrackEvolutionResponse) {};
}

message SetStreamSpeedRequest {
  float speed = 1;
}

message DataPoint {
  double value = 1;
  int64 timestamp = 2;
}

message QualifyingRequest {
  int32 year = 1;
  int32 round = 2;
  string segment = 3;
}

message Prediction {
  string driver = 1;
  string team = 2;
  float time = 3;
}

message QualifyingPrediction {
  repeated Prediction predictions = 1;
}

message TrackEvolutionResponse {
  repeated Duration trackEvolution = 1;
}