<div class="flex flex-col gap-4 h-full">
  <div
    class="flex flex-row items-center w-full gap-8 p-4 bg-white dark:bg-surface-900 rounded shadow"
  >
    <div>
      <span>Year: </span>
      <p-select
        [options]="years"
        [ngModel]="year().toString()"
        (onChange)="selectYear($event)"
      ></p-select>
    </div>

    <div>
      <span>Event: </span>
      <p-select
        [options]="events()"
        [placeholder]="'Select an event'"
        [disabled]="!events()?.length"
        (onChange)="selectEvent($event)"
      ></p-select>
    </div>

    <div>
      <span>Segment: </span>
      <p-select
        [options]="segments"
        [ngModel]="segment()"
        [disabled]="!event()"
        [placeholder]="'Select a qualifying segment'"
        (onChange)="selectSegment($event)"
      ></p-select>
    </div>
  </div>

  <div class="flex flex-row flex-1 gap-4 min-h-0">
    <div class="flex flex-col min-h-0 flex-3 p-4 bg-white dark:bg-surface-900 rounded shadow">
      @if (selection()) {
        <tl-qualifying-table class="min-h-0" [rowData]="rowData()"></tl-qualifying-table>
      }
    </div>

    <div class="flex flex-col flex-2 p-4 bg-white dark:bg-surface-900 rounded shadow">
      @if (selection()) {
        <tl-track-evolution-chart class="min-h-0" ></tl-track-evolution-chart>
      }
    </div>
  </div>

</div>
