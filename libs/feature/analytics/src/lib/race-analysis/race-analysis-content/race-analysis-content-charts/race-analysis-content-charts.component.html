@if (eventSelection()) {
  <div class="grid grid-cols-2 gap-2">

    <tl-race-analysis-chart-tile [title]="'Delta to Winner'">
      <tl-leader-gap-bar-chart
        #chart
        chart
        class="h-full"
        [tlChartTitle]="false"
        [eventSelection]="eventSelection()"
      ></tl-leader-gap-bar-chart>
    </tl-race-analysis-chart-tile>

    <tl-race-analysis-chart-tile [title]="'Fastest Sector'">
      <div chart class="flex flex-col h-full">
        <div class="flex flex-row gap-2 items-center">
          @let fastest = fastestSectorTime();
          @if (fastest !== undefined) {
            <div class="text-purple-600 dark:text-purple-400 font-extrabold">Fastest
              Sector Time:
            </div>
            <div>{{ millisecondsToTimingString(fastest) }}</div>
          }
        </div>
        <p-select-button [options]="sectors"
                         [ngModel]="sector()"
                         (ngModelChange)="sector.set($event)"
                         [fluid]="true"
        ></p-select-button>
        <tl-sector-comparison-chart
          #chart
          class="h-full"
          [tlChartTitle]="false"
          [eventSelection]="eventSelection()"
          [sector]="sector()"
          (fastestSectorTime)="fastestSectorTime.set($event)"
        ></tl-sector-comparison-chart>
      </div>
    </tl-race-analysis-chart-tile>


    <tl-race-analysis-chart-tile class="col-span-2" [title]="'Position Changes'">
      <tl-position-changes-chart
        #chart
        chart
        class="h-full"
        [tlChartTitle]="false"
        [eventSelection]="eventSelection()">
      </tl-position-changes-chart>
    </tl-race-analysis-chart-tile>

    <tl-race-analysis-chart-tile [title]="'Strategy Comparison'">
      <tl-strategy-comparison-chart chart
                                    #chart
                                    class="h-full"
                                    [tlChartTitle]="false"
                                    [eventSelection]="eventSelection()">
      </tl-strategy-comparison-chart>
    </tl-race-analysis-chart-tile>

    <tl-race-analysis-chart-tile [title]="'WDC Contenders'">
      <tl-wdc-contenders-chart
        #chart
        chart
        class="h-full"
        [tlChartTitle]="false"
        [eventSelection]="eventSelection()"
      ></tl-wdc-contenders-chart>
    </tl-race-analysis-chart-tile>

    <tl-race-analysis-chart-tile class="col-span-2" [title]="'Delta Development'">
      <tl-leader-gap-line-chart
        #chart
        chart
        class="h-full"
        [tlChartTitle]="false"
        [eventSelection]="eventSelection()">
      </tl-leader-gap-line-chart>
    </tl-race-analysis-chart-tile>
  </div>

} @else {
  <div class="w-full text-center text-xl">Please select a session to start.</div>
}
