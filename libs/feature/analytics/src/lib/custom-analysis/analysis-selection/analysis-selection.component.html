<div class="flex flex-col h-full p-6">
  <p-icon-field class="w-full mb-6">
    <p-inputicon class="pi pi-search" />
    <input pInputText
           class="w-full"
           [type]="'search'"
           [placeholder]="'Search'"
           [ngModel]="filterString()"
           (ngModelChange)="filterString.set($event)"
    />
  </p-icon-field>
  <div class="flex flex-row flex-wrap justify-around content-start h-full gap-6 overflow-auto">
    @for (tile of filteredTiles(); track tile) {
      <tl-analytics-tile
        class="flex w-60 aspect-square"
        [title]="tile.title"
        [description]="tile.description"
        [icon]="tile.icon"
        (click)="tile.callback()"
      ></tl-analytics-tile>
    }
  </div>
</div>
