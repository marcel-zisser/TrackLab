<div class="h-full w-full flex flex-col md:flex-row gap-8 p-6">
  <button
    class="flex flex-col gap-8 w-full justify-center items-center p-8
           bg-primary rounded-lg
           hover:cursor-pointer hover:scale-101 transition-transform duration-150"
    [routerLink]="'race'"
  >
    <div class="text-white font-[Audiowide] text-4xl">Race Analysis</div>
    <div class="text-white text-xl">Get a general overview of a specific race.</div>
  </button>
  <button
    class="flex flex-col gap-8 w-full justify-center items-center p-8
           bg-primary rounded-lg
           hover:cursor-pointer hover:scale-101 transition-transform duration-150"
    [routerLink]="'custom'"
  >
    <div class="text-white font-[Audiowide] text-4xl">Custom Analysis</div>
    <div class="text-white text-xl text-center">
      Create your own custom charts.
      Available analyses include the Race Analysis charts, as well as other telemetry-data based charts.
    </div>
  </button>
</div>
