<tl-mode-selection>
  <div left class="h-full w-full flex flex-col gap-4 justify-center" [routerLink]="'race'">
    <div class="text-white font-[Audiowide] text-4xl">Race Analysis</div>
    <div class="text-white text-xl">
      Get a general overview of a specific race.
    </div>
  </div>
  <div right class="h-full w-full flex flex-col gap-4 justify-center"[routerLink]="'custom'">
    <div class="text-white font-[Audiowide] text-4xl">Custom Analysis</div>
    <div class="text-white text-xl text-center">
      Create your own custom charts. Available analyses include the Race
      Analysis charts, as well as other telemetry-data based charts.
    </div>
  </div>
</tl-mode-selection>
